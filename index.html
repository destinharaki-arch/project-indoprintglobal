<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IndoPrintGlobal Project</title>
  </head>
  
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.shop-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 1.5rem 1rem;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}
.shop-title { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.shop-subtitle { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
.cart-btn {
  position: relative; background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md);
  padding: 8px 14px; font-size: 14px; cursor: pointer; color: var(--color-text-primary);
  display: flex; align-items: center; gap: 6px;
}
.cart-badge {
  position: absolute; top: -6px; right: -6px;
  background: #D85A30; color: white; font-size: 11px; font-weight: 500;
  border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
}
.filters {
  display: flex; gap: 8px; padding: 1rem 1.5rem;
  overflow-x: auto; scrollbar-width: none;
}
.filter-btn {
  flex-shrink: 0; padding: 5px 14px; font-size: 13px;
  border: 0.5px solid var(--color-border-secondary); border-radius: 20px;
  cursor: pointer; background: transparent; color: var(--color-text-secondary);
  transition: all 0.15s;
}
.filter-btn.active {
  background: #7F77DD; color: white; border-color: #7F77DD;
}
.products {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px; padding: 0.5rem 1.5rem 1.5rem;
}
.product-card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg); overflow: hidden; cursor: pointer;
  transition: border-color 0.15s;
}
.product-card:hover { border-color: var(--color-border-secondary); }
.product-img {
  width: 100%; aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; position: relative;
}
.badge-new {
  position: absolute; top: 8px; left: 8px;
  background: #E1F5EE; color: #0F6E56; font-size: 10px; font-weight: 500;
  padding: 2px 7px; border-radius: 10px;
}
.badge-hot {
  position: absolute; top: 8px; left: 8px;
  background: #FAECE7; color: #993C1D; font-size: 10px; font-weight: 500;
  padding: 2px 7px; border-radius: 10px;
}
.product-info { padding: 10px 12px 12px; }
.product-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
.product-pack { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
.product-footer { display: flex; align-items: center; justify-content: space-between; }
.product-price { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.add-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: #7F77DD; color: white; border: none;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.add-btn:active { transform: scale(0.92); }
.cart-panel {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; justify-content: center;
}
.cart-panel.open { display: flex; }
.cart-sheet {
  background: var(--color-background-primary);
  border-radius: 16px 16px 0 0; width: 100%; max-width: 520px;
  padding: 1.5rem; max-height: 70vh; display: flex; flex-direction: column;
}
.cart-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.cart-title { font-size: 17px; font-weight: 500; }
.close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--color-text-secondary); }
.cart-items { flex: 1; overflow-y: auto; }
.cart-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary);
}
.cart-item-icon { font-size: 28px; }
.cart-item-name { font-size: 14px; font-weight: 500; flex: 1; }
.cart-item-qty { font-size: 13px; color: var(--color-text-secondary); }
.cart-item-price { font-size: 14px; font-weight: 500; }
.cart-total {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 1rem; margin-top: 0.5rem;
  font-size: 15px; font-weight: 500;
}
.checkout-btn {
  width: 100%; margin-top: 1rem; padding: 13px;
  background: #7F77DD; color: white; border: none;
  border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; cursor: pointer;
}
.checkout-btn:active { opacity: 0.85; }
.empty-cart { text-align: center; padding: 2rem 0; color: var(--color-text-secondary); font-size: 14px; }
</style>

<div class="shop-header">
  <div>
    <div class="shop-title">Stiker Shopping</div>
    <div class="shop-subtitle">Koleksi stiker lucu & estetik</div>
  </div>
  <button class="cart-btn" onclick="openCart()">
    Keranjang
    <span class="cart-badge" id="cart-count">0</span>
  </button>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filter(this,'all')">Semua</button>
  <button class="filter-btn" onclick="filter(this,'lucu')">Lucu</button>
  <button class="filter-btn" onclick="filter(this,'estetik')">Estetik</button>
  <button class="filter-btn" onclick="filter(this,'kpop')">K-Pop</button>
  <button class="filter-btn" onclick="filter(this,'alam')">Alam</button>
  <button class="filter-btn" onclick="filter(this,'food')">Makanan</button>
</div>

<div class="products" id="products"></div>

<div class="cart-panel" id="cart-panel" onclick="closeCartOutside(event)">
  <div class="cart-sheet">
    <div class="cart-head">
      <span class="cart-title">Keranjang Belanja</span>
      <button class="close-btn" onclick="openCart()">×</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-total">
      <span>Total</span>
      <span id="cart-total">Rp 0</span>
    </div>
    <button class="checkout-btn" onclick="checkout()">Bayar Sekarang</button>
  </div>
</div>

<script>
const products = [
  { id:1, icon:"🐱", name:"Kucing Lucu", pack:"10 pcs/pack", price:12000, cat:"lucu", badge:"hot" },
  { id:2, icon:"🌸", name:"Bunga Sakura", pack:"8 pcs/pack", price:15000, cat:"estetik", badge:"new" },
  { id:3, icon:"⭐", name:"Bintang Mini", pack:"20 pcs/pack", price:8000, cat:"lucu", badge:null },
  { id:4, icon:"🦋", name:"Kupu-kupu", pack:"12 pcs/pack", price:14000, cat:"alam", badge:"new" },
  { id:5, icon:"🍜", name:"Ramen Bowl", pack:"6 pcs/pack", price:11000, cat:"food", badge:null },
  { id:6, icon:"🌿", name:"Daun Hijau", pack:"15 pcs/pack", price:10000, cat:"alam", badge:null },
  { id:7, icon:"💜", name:"Aesthetic Heart", pack:"10 pcs/pack", price:13000, cat:"estetik", badge:"hot" },
  { id:8, icon:"🐻", name:"Teddy Bear", pack:"8 pcs/pack", price:16000, cat:"lucu", badge:null },
  { id:9, icon:"🎵", name:"Music Note", pack:"12 pcs/pack", price:9000, cat:"kpop", badge:"new" },
  { id:10, icon:"🍓", name:"Stroberi", pack:"10 pcs/pack", price:12000, cat:"food", badge:null },
  { id:11, icon:"🌙", name:"Bulan Bintang", pack:"8 pcs/pack", price:14000, cat:"estetik", badge:null },
  { id:12, icon:"🐸", name:"Katak Kecil", pack:"10 pcs/pack", price:11000, cat:"lucu", badge:"hot" },
];

let cart = {};
let activeFilter = "all";

function fmt(n){ return "Rp " + n.toLocaleString("id-ID"); }

function renderProducts(cat){
  const list = cat === "all" ? products : products.filter(p => p.cat === cat);
  document.getElementById("products").innerHTML = list.map(p => `
    <div class="product-card">
      <div class="product-img" style="background:${bgColor(p.cat)}">
        ${p.badge === "new" ? '<span class="badge-new">Baru</span>' : p.badge === "hot" ? '<span class="badge-hot">Terlaris</span>' : ''}
        ${p.icon}
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-pack">${p.pack}</div>
        <div class="product-footer">
          <div class="product-price">${fmt(p.price)}</div>
          <button class="add-btn" onclick="addToCart(${p.id})">+</button>
        </div>
      </div>
    </div>
  `).join("");
}

function bgColor(cat){
  const m = {lucu:"#EEEDFE",estetik:"#FBEAF0",kpop:"#FAECE7",alam:"#E1F5EE",food:"#FAEEDA"};
  return m[cat] || "#F1EFE8";
}

function filter(btn, cat){
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeFilter = cat;
  renderProducts(cat);
}

function addToCart(id){
  cart[id] = (cart[id] || 0) + 1;
  updateCartCount();
}

function updateCartCount(){
  const total = Object.values(cart).reduce((a,b)=>a+b,0);
  document.getElementById("cart-count").textContent = total;
}

function openCart(){
  const panel = document.getElementById("cart-panel");
  panel.classList.toggle("open");
  renderCart();
}

function closeCartOutside(e){
  if(e.target === document.getElementById("cart-panel")) openCart();
}

function renderCart(){
  const ids = Object.keys(cart).filter(id => cart[id] > 0);
  if(ids.length === 0){
    document.getElementById("cart-items").innerHTML = '<div class="empty-cart">Keranjang masih kosong</div>';
    document.getElementById("cart-total").textContent = "Rp 0";
    return;
  }
  let total = 0;
  document.getElementById("cart-items").innerHTML = ids.map(id => {
    const p = products.find(x => x.id == id);
    const sub = p.price * cart[id];
    total += sub;
    return `<div class="cart-item">
      <span class="cart-item-icon">${p.icon}</span>
      <span class="cart-item-name">${p.name}</span>
      <span class="cart-item-qty">×${cart[id]}</span>
      <span class="cart-item-price">${fmt(sub)}</span>
    </div>`;
  }).join("");
  document.getElementById("cart-total").textContent = fmt(total);
}

function checkout(){
  const total = Object.values(cart).reduce((a,b)=>a+b,0);
  if(total === 0){ alert("Keranjang masih kosong!"); return; }
  sendPrompt("Saya ingin checkout stiker-stiker di keranjang saya. Tolong bantu proses pembayaran dan pengiriman.");
}

renderProducts("all");
</script>

  <body>
    <div id="root"></div>
  </body>
</html>
